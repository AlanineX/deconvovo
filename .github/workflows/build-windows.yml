name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'          # Build on version tags (v0.1.0, v1.0.0, etc.)
  workflow_dispatch:    # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pyside6 numpy scipy pandas matplotlib plotly
        pip install unidec
        pip install -e .

    - name: Build executable
      run: |
        pyinstaller --noconfirm --clean build/deconvovo.spec

    - name: Verify build
      run: |
        dir dist\DeconVoVo
        dir dist\DeconVoVo\DeconVoVo.exe

    - name: Zip distribution
      run: |
        cd dist
        Compress-Archive -Path DeconVoVo -DestinationPath DeconVoVo-win64.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DeconVoVo-win64
        path: dist/DeconVoVo-win64.zip
        retention-days: 30

    - name: Upload to release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/DeconVoVo-win64.zip
        generate_release_notes: true
